<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스네이크 게임</title>
    <!-- 빠르고 세련된 디자인을 위해 Tailwind CSS를 불러옵니다 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 터치 기기에서 게임 중 화면이 스크롤되는 것을 방지합니다 */
        body {
            touch-action: none;
        }
        #game-board {
            /* 캔버스 배경에 은은한 격자무늬를 추가하여 레트로한 느낌을 줍니다 */
            background-image: 
                linear-gradient(#374151 1px, transparent 1px),
                linear-gradient(90deg, #374151 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans flex flex-col items-center justify-center min-h-screen m-0 overflow-hidden">
    
    <div class="w-full max-w-md p-4 flex flex-col items-center">
        <!-- 게임 제목 -->
        <h1 class="text-4xl font-extrabold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500">
            스네이크 게임
        </h1>
        
        <!-- 점수판 -->
        <div class="flex justify-between w-full mb-4 px-2">
            <div class="bg-gray-800 px-4 py-2 rounded-lg shadow">
                <span class="text-gray-400 text-sm block">현재 점수</span>
                <span id="score" class="text-2xl font-bold text-green-400">0</span>
            </div>
            <div class="bg-gray-800 px-4 py-2 rounded-lg shadow text-right">
                <span class="text-gray-400 text-sm block">최고 점수</span>
                <span id="high-score" class="text-2xl font-bold text-blue-400">0</span>
            </div>
        </div>
        
        <!-- 게임 화면 (캔버스) 영역 -->
        <div class="relative w-full aspect-square bg-gray-800 rounded-xl shadow-2xl border-4 border-gray-700 overflow-hidden">
            <canvas id="game-board" width="400" height="400" class="w-full h-full block"></canvas>
            
            <!-- 게임 오버 및 시작 화면 오버레이 -->
            <div id="game-overlay" class="absolute inset-0 bg-gray-900 bg-opacity-90 flex flex-col items-center justify-center z-10 transition-opacity duration-300">
                <h2 id="overlay-title" class="text-5xl font-black text-red-500 mb-2 tracking-wider">게임 오버!</h2>
                <p id="overlay-desc" class="text-gray-300 mb-8 text-lg">다시 도전해보세요</p>
                <button id="start-btn" class="px-8 py-4 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold text-xl rounded-full shadow-lg transition transform hover:scale-105 active:scale-95">
                    게임 시작
                </button>
            </div>
        </div>

        <!-- 조작 설명 -->
        <div class="mt-6 text-gray-500 text-center text-sm bg-gray-800 p-4 rounded-lg w-full">
            <p class="mb-2"><span class="font-bold text-gray-300">💻 PC:</span> 키보드 방향키 (또는 W, A, S, D)</p>
            <p><span class="font-bold text-gray-300">📱 모바일:</span> 화면을 상하좌우로 스와이프</p>
        </div>
    </div>

    <script>
        // HTML 요소들 가져오기
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const gameOverlay = document.getElementById('game-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');

        // 게임 설정 변수
        const gridSize = 20; // 뱀과 먹이의 크기
        let tileCountX, tileCountY;
        
        let snake = []; // 뱀의 몸통 좌표를 담을 배열
        let food = {};  // 먹이의 좌표
        let dx = 0;     // X축 이동 방향 (1: 우, -1: 좌, 0: 정지)
        let dy = 0;     // Y축 이동 방향 (1: 하, -1: 상, 0: 정지)
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let speed = 120; // 밀리초 단위 (숫자가 작을수록 빠름)
        let gameLoopTimeout;
        let isGameRunning = false;

        // 최고 점수 표시
        highScoreElement.textContent = highScore;

        // 캔버스 크기를 컨테이너에 맞게 조절
        function resizeCanvas() {
            // CSS에서 정의한 실제 렌더링 크기에 맞춰 내부 해상도 설정
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            tileCountX = Math.floor(canvas.width / gridSize);
            tileCountY = Math.floor(canvas.height / gridSize);
        }

        // 창 크기가 바뀔 때마다 캔버스 크기 재조정
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 초기 화면 설정 (아직 시작 안 한 상태)
        overlayTitle.textContent = "SNAKE";
        overlayTitle.className = "text-5xl font-black text-green-500 mb-2 tracking-wider";
        overlayDesc.textContent = "먹이를 먹고 길어지세요!";
        
        // 게임 초기화 및 시작
        function startGame() {
            // 뱀을 화면 중앙에 배치
            const startX = Math.floor(tileCountX / 2);
            const startY = Math.floor(tileCountY / 2);
            snake = [{x: startX, y: startY}];
            
            dx = 0;
            dy = 0;
            score = 0;
            speed = 120; // 초기 속도
            isGameRunning = true;
            
            scoreElement.textContent = score;
            gameOverlay.classList.add('hidden'); // 오버레이 숨기기
            clearTimeout(gameLoopTimeout);
            
            generateFood();
            gameLoop();
        }

        // 메인 게임 루프 (계속 반복됨)
        function gameLoop() {
            if (!isGameRunning) return;

            // 뱀 이동 방향이 설정되었을 때만 이동
            if (dx !== 0 || dy !== 0) {
                moveSnake();
            }
            
            if (checkGameOver()) {
                handleGameOver();
                return;
            }

            clearCanvas();
            checkFoodCollision();
            drawFood();
            drawSnake();

            // 설정된 속도(speed)에 따라 다음 프레임 예약
            gameLoopTimeout = setTimeout(gameLoop, speed);
        }

        // 화면 지우기
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 뱀 그리기
        function drawSnake() {
            snake.forEach((part, index) => {
                // 머리는 밝은 초록색, 몸통은 약간 어두운 초록색
                ctx.fillStyle = index === 0 ? '#4ADE80' : '#22C55E';
                
                // 모서리를 약간 둥글게 그리기 위한 편법 (원과 사각형 조합)
                const x = part.x * gridSize;
                const y = part.y * gridSize;
                const size = gridSize - 1; // 격자선이 보이도록 1px 작게
                
                ctx.beginPath();
                ctx.roundRect(x, y, size, size, 4);
                ctx.fill();
            });
        }

        // 뱀 이동 로직
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // 새로운 머리를 맨 앞에 추가
            // 먹이를 먹지 않았다면 꼬리를 자름 (먹었다면 checkFoodCollision에서 처리)
            snake.pop();
        }

        // 먹이 그리기
        function drawFood() {
            const x = food.x * gridSize + gridSize / 2;
            const y = food.y * gridSize + gridSize / 2;
            
            ctx.fillStyle = '#EF4444'; // 빨간색 사과 느낌
            ctx.beginPath();
            ctx.arc(x, y, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // 먹이 충돌(먹음) 체크
        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                
                // 점수가 오를수록 속도 증가 (최소 속도 제한)
                if(speed > 60) speed -= 2;

                // 뱀 길이 늘리기 (이동 로직에서 잘렸던 꼬리를 다시 추가하는 방식)
                snake.push({...snake[snake.length - 1]});

                generateFood();
            }
        }

        // 새 먹이 무작위 위치에 생성
        function generateFood() {
            let isFoodOnSnake;
            do {
                isFoodOnSnake = false;
                food.x = Math.floor(Math.random() * tileCountX);
                food.y = Math.floor(Math.random() * tileCountY);
                
                // 뱀의 몸 위에 먹이가 생성되지 않도록 체크
                for(let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        isFoodOnSnake = true;
                        break;
                    }
                }
            } while (isFoodOnSnake);
        }

        // 게임 오버 조건 체크 (벽 충돌, 자기 몸 충돌)
        function checkGameOver() {
            const head = snake[0];
            
            // 1. 벽에 부딪혔는지
            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                return true;
            }

            // 2. 자기 몸에 부딪혔는지 (움직이기 시작했을 때만 체크)
            if (dx !== 0 || dy !== 0) {
                for (let i = 1; i < snake.length; i++) {
                    if (head.x === snake[i].x && head.y === snake[i].y) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 게임 오버 처리
        function handleGameOver() {
            isGameRunning = false;
            
            overlayTitle.textContent = "GAME OVER";
            overlayTitle.className = "text-5xl font-black text-red-500 mb-2 tracking-wider";
            overlayDesc.textContent = `최종 점수: ${score}점`;
            gameOverlay.classList.remove('hidden');

            // 최고 점수 갱신
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
                overlayDesc.textContent = `🎉 신기록 달성: ${score}점! 🎉`;
            }
        }

        // ===== 키보드 조작 이벤트 =====
        document.addEventListener('keydown', (event) => {
            if (!isGameRunning) return;
            
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            switch(event.key) {
                case 'ArrowLeft': case 'a': case 'A':
                    if (!goingRight) { dx = -1; dy = 0; }
                    break;
                case 'ArrowUp': case 'w': case 'W':
                    if (!goingDown) { dx = 0; dy = -1; }
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    if (!goingLeft) { dx = 1; dy = 0; }
                    break;
                case 'ArrowDown': case 's': case 'S':
                    if (!goingUp) { dx = 0; dy = 1; }
                    break;
            }
        });

        // ===== 모바일 터치(스와이프) 조작 이벤트 =====
        let touchStartX = 0;
        let touchStartY = 0;

        const gameArea = document.getElementById('game-board');

        gameArea.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        gameArea.addEventListener('touchmove', (e) => {
            // 게임 중에는 스크롤 방지
            e.preventDefault();
        }, {passive: false});

        gameArea.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;
            
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            // 너무 짧은 터치는 무시
            if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) return;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // 가로 스와이프
                if (diffX > 0 && !goingLeft) { dx = 1; dy = 0; }
                else if (diffX < 0 && !goingRight) { dx = -1; dy = 0; }
            } else {
                // 세로 스와이프
                if (diffY > 0 && !goingUp) { dx = 0; dy = 1; }
                else if (diffY < 0 && !goingDown) { dx = 0; dy = -1; }
            }
        }, {passive: false});

        // 버튼 클릭 시 게임 시작
        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
